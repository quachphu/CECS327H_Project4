<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P2P Network Dashboard — CECS 327 Project 4</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      body {
        margin: 0;
        font-family: monospace;
        background: #111;
        color: #ccc;
      }
      header {
        background: #1a1a2e;
        padding: 14px 24px;
        border-bottom: 1px solid #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header h1 {
        font-size: 16px;
        color: #4fc3f7;
        margin: 0;
      }
      #update-status {
        font-size: 12px;
        color: #81c784;
      }

      .stats {
        display: flex;
        gap: 12px;
        padding: 12px 24px;
        background: #161616;
        border-bottom: 1px solid #222;
      }
      .stat {
        flex: 1;
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 12px;
        text-align: center;
      }
      .stat .label {
        font-size: 11px;
        color: #666;
        text-transform: uppercase;
      }
      .stat .value {
        font-size: 26px;
        font-weight: bold;
        color: #4fc3f7;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 16px 24px;
      }
      .panel {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        padding: 16px;
      }
      .panel h2 {
        font-size: 13px;
        color: #4fc3f7;
        margin: 0 0 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #2a2a2a;
        text-transform: uppercase;
      }

      /* Peer list */
      #peer-list {
        max-height: 320px;
        overflow-y: auto;
      }
      .peer-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 10px;
        margin-bottom: 5px;
        background: #222;
        border-radius: 5px;
        border-left: 3px solid #4fc3f7;
        font-size: 13px;
      }
      .peer-item.dead {
        border-left-color: #e53935;
        opacity: 0.55;
      }
      .peer-item .detail {
        font-size: 11px;
        color: #666;
        margin-top: 2px;
      }
      .badge {
        font-size: 10px;
        font-weight: bold;
        padding: 2px 7px;
        border-radius: 3px;
      }
      .badge.alive {
        background: #1b3a1b;
        color: #81c784;
      }
      .badge.dead {
        background: #3a1b1b;
        color: #e57373;
      }

      /* Events table */
      .wide {
        grid-column: span 2;
      }
      #events-wrap {
        max-height: 220px;
        overflow-y: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      th {
        color: #555;
        text-align: left;
        padding: 6px 8px;
        border-bottom: 1px solid #2a2a2a;
      }
      td {
        padding: 6px 8px;
        border-bottom: 1px solid #1a1a1a;
      }
      tr:hover td {
        background: #222;
      }
      .tag {
        font-size: 10px;
        font-weight: bold;
        padding: 1px 5px;
        border-radius: 3px;
      }
      .tag.upload {
        background: #1b3a1b;
        color: #a5d6a7;
      }
      .tag.download {
        background: #0d2a5e;
        color: #90caf9;
      }
      .tag.kv {
        background: #3a1f00;
        color: #ffcc80;
      }
      .tag.forward {
        background: #2a0050;
        color: #ce93d8;
      }
      .tag.register {
        background: #003333;
        color: #80deea;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>P2P Network Dashboard — CECS 327 Project 4</h1>
      <span id="update-status">Connecting...</span>
    </header>

    <!-- Summary stats -->
    <div class="stats">
      <div class="stat">
        <div class="label">Active Peers</div>
        <div class="value" id="s-peers">0</div>
      </div>
      <div class="stat">
        <div class="label">Total Files</div>
        <div class="value" id="s-files">0</div>
      </div>
      <div class="stat">
        <div class="label">KV Entries</div>
        <div class="value" id="s-kv">0</div>
      </div>
      <div class="stat">
        <div class="label">Total Events</div>
        <div class="value" id="s-events">0</div>
      </div>
    </div>

    <div class="grid">
      <!-- Network Graph (D3.js) -->
      <div class="panel">
        <h2>Network Graph</h2>
        <div id="graph" style="height: 320px"></div>
      </div>

      <!-- Active Peers -->
      <div class="panel">
        <h2>Active Peers</h2>
        <div id="peer-list"></div>
      </div>

      <!-- Traffic chart (Chart.js) -->
      <div class="panel wide">
        <h2>Message Traffic Over Time</h2>
        <canvas id="traffic" style="max-height: 200px"></canvas>
      </div>

      <!-- Events log -->
      <div class="panel wide">
        <h2>Recent Events</h2>
        <div id="events-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Event</th>
                <th>Source</th>
                <th>Target</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody id="events-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const POLL_MS = 3000;

      // Chart.js traffic chart
      const chart = new Chart(
        document.getElementById("traffic").getContext("2d"),
        {
          type: "line",
          data: {
            labels: [],
            datasets: [
              {
                label: "Total Events",
                data: [],
                borderColor: "#4fc3f7",
                backgroundColor: "rgba(79,195,247,0.08)",
                tension: 0.3,
                fill: true,
              },
              {
                label: "Active Peers",
                data: [],
                borderColor: "#81c784",
                backgroundColor: "rgba(129,199,132,0.08)",
                tension: 0.3,
                fill: true,
              },
            ],
          },
          options: {
            responsive: true,
            animation: false,
            scales: {
              x: {
                ticks: { color: "#555", maxTicksLimit: 12 },
                grid: { color: "#222" },
              },
              y: {
                ticks: { color: "#555" },
                grid: { color: "#222" },
                beginAtZero: true,
              },
            },
            plugins: {
              legend: {
                labels: { color: "#888", font: { family: "monospace" } },
              },
            },
          },
        },
      );

      // D3 force graph
      const container = document.getElementById("graph");
      const W = container.clientWidth,
        H = 320;
      const svg = d3
        .select("#graph")
        .append("svg")
        .attr("width", W)
        .attr("height", H);
      const g = svg.append("g");
      svg.call(d3.zoom().on("zoom", (e) => g.attr("transform", e.transform)));

      const sim = d3
        .forceSimulation()
        .force(
          "link",
          d3
            .forceLink()
            .id((d) => d.id)
            .distance(90),
        )
        .force("charge", d3.forceManyBody().strength(-180))
        .force("center", d3.forceCenter(W / 2, H / 2))
        .force("collision", d3.forceCollide(28));

      function updateGraph(peers, connections) {
        const nodes = Object.entries(peers).map(([id, info]) => ({
          id,
          alive: info.alive,
        }));

        const seen = new Set();
        const links = connections.reduce((acc, c) => {
          const key = [c.source, c.target].sort().join("|");
          if (!seen.has(key)) {
            seen.add(key);
            acc.push({ source: c.source, target: c.target });
          }
          return acc;
        }, []);

        const link = g
          .selectAll(".lnk")
          .data(links, (d) => d.source + d.target);
        link.exit().remove();
        link
          .enter()
          .append("line")
          .attr("class", "lnk")
          .attr("stroke", "#333")
          .attr("stroke-width", 1.5);

        const node = g.selectAll(".nd").data(nodes, (d) => d.id);
        node.exit().remove();
        const ne = node
          .enter()
          .append("g")
          .attr("class", "nd")
          .call(
            d3
              .drag()
              .on("start", (e, d) => {
                if (!e.active) sim.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
              })
              .on("drag", (e, d) => {
                d.fx = e.x;
                d.fy = e.y;
              })
              .on("end", (e, d) => {
                if (!e.active) sim.alphaTarget(0);
                d.fx = null;
                d.fy = null;
              }),
          );
        ne.append("circle")
          .attr("r", 13)
          .attr("stroke", "#4fc3f7")
          .attr("stroke-width", 2);
        ne.append("text")
          .attr("dy", -18)
          .attr("text-anchor", "middle")
          .attr("font-size", "9px")
          .attr("fill", "#aaa");

        g.selectAll(".nd circle").attr("fill", (d) =>
          d.alive ? "#1a3a5a" : "#5a1a1a",
        );
        g.selectAll(".nd text").text((d) => d.id);

        sim.nodes(nodes).on("tick", () => {
          g.selectAll(".lnk")
            .attr("x1", (d) => d.source.x)
            .attr("y1", (d) => d.source.y)
            .attr("x2", (d) => d.target.x)
            .attr("y2", (d) => d.target.y);
          g.selectAll(".nd").attr(
            "transform",
            (d) => `translate(${d.x},${d.y})`,
          );
        });
        sim.force("link").links(links);
        sim.alpha(0.3).restart();
      }

      // Peer list
      function updatePeerList(peers) {
        const el = document.getElementById("peer-list");
        const html = Object.entries(peers)
          .map(([id, info]) => {
            const reqs = Object.values(info.request_count || {}).reduce(
              (a, b) => a + b,
              0,
            );
            return `<div class="peer-item ${info.alive ? "" : "dead"}">
            <div>
              <div>${id}</div>
              <div class="detail">Files: ${info.files_count || 0} | KV: ${info.kv_count || 0} | Reqs: ${reqs}</div>
            </div>
            <span class="badge ${info.alive ? "alive" : "dead"}">${info.alive ? "ALIVE" : "DOWN"}</span>
          </div>`;
          })
          .join("");
        el.innerHTML =
          html ||
          `<div style="color:#555;padding:16px;text-align:center;">No peers yet...</div>`;
      }

      // Events table
      function tagClass(evt) {
        if (evt.includes("upload")) return "upload";
        if (evt.includes("download")) return "download";
        if (evt.includes("kv")) return "kv";
        if (evt.includes("forward") || evt.includes("redirect"))
          return "forward";
        if (evt.includes("register")) return "register";
        return "";
      }

      function updateEvents(metrics) {
        const rows = metrics
          .slice(-50)
          .reverse()
          .map((m) => {
            const t = new Date(m.timestamp * 1000).toLocaleTimeString();
            const d = m.details ? JSON.stringify(m.details).slice(0, 55) : "";
            return `<tr>
            <td>${t}</td>
            <td><span class="tag ${tagClass(m.event)}">${m.event}</span></td>
            <td>${m.source || "-"}</td>
            <td>${m.target || "-"}</td>
            <td style="color:#555;">${d}</td>
          </tr>`;
          })
          .join("");
        document.getElementById("events-body").innerHTML =
          rows ||
          `<tr><td colspan="5" style="color:#555;text-align:center;">No events yet...</td></tr>`;
      }

      // Poll
      async function poll() {
        try {
          const state = await fetch("/api/state").then((r) => r.json());
          const peers = state.peers || {};

          // Stats
          document.getElementById("s-peers").textContent = Object.values(
            peers,
          ).filter((p) => p.alive).length;
          document.getElementById("s-files").textContent = Object.values(
            peers,
          ).reduce((s, p) => s + (p.files_count || 0), 0);
          document.getElementById("s-kv").textContent = Object.values(
            peers,
          ).reduce((s, p) => s + (p.kv_count || 0), 0);
          document.getElementById("s-events").textContent = (
            state.metrics || []
          ).length;

          updatePeerList(peers);
          updateGraph(peers, state.connections || []);
          updateEvents(state.metrics || []);

          // Traffic chart
          const traffic = state.traffic || [];
          chart.data.labels = traffic.map((t) =>
            new Date(t.timestamp * 1000).toLocaleTimeString(),
          );
          chart.data.datasets[0].data = traffic.map((t) => t.total_events);
          chart.data.datasets[1].data = traffic.map((t) => t.active_peers);
          chart.update("none");

          const ts = new Date(state.last_update * 1000).toLocaleTimeString();
          document.getElementById("update-status").textContent = `Live — ${ts}`;
        } catch {
          document.getElementById("update-status").textContent =
            "Connection error";
        }
      }

      poll();
      setInterval(poll, POLL_MS);
    </script>
  </body>
</html>
