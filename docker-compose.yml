      NODE_HOST: node-3
      DISCOVERY_INTERVAL: '10'
      STORAGE_DIR: /app/storage
    volumes:
    - ./storage/node-3:/app/storage
    networks:
    - p2p-net
    depends_on:
    - bootstrap
    restart: unless-stopped
  node-4:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-4
    ports:
    - 5004:5000
    environment:
