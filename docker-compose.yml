services:
  bootstrap:
    build:
      context: .
      dockerfile: bootstrap.Dockerfile
    container_name: bootstrap
    ports:
    - 5010:5000
    networks:
    - p2p-net
    restart: unless-stopped
  dashboard:
    build:
      context: .
      dockerfile: dashboard.Dockerfile
    container_name: dashboard
    ports:
    - 8080:8080
    environment:
      BOOTSTRAP_URL: http://bootstrap:5000
      POLL_INTERVAL: '5'
    networks:
    - p2p-net
    depends_on:
    - bootstrap
    restart: unless-stopped
  node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-1
    ports:
    - 5001:5000
    environment:
      NODE_ID: node-1
      NODE_PORT: '5000'
      BOOTSTRAP_URL: http://bootstrap:5000
      NODE_HOST: node-1
      DISCOVERY_INTERVAL: '10'
      STORAGE_DIR: /app/storage
    volumes:
    - ./storage/node-1:/app/storage
    networks:
    - p2p-net
    depends_on:
    - bootstrap
    restart: unless-stopped
  node-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-2
    ports:
    - 5002:5000
    environment:
